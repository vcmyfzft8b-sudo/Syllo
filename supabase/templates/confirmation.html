<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Memo verification code</title>
  </head>
  <body style="margin:0;padding:0;background:#f5f4f7;color:#17171b;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <div style="max-width:560px;margin:0 auto;padding:32px 20px;">
      <div style="background:#e9e7ef;border-radius:32px;padding:0 32px 28px;text-align:center;">
        <div style="display:inline-block;margin:-1px auto 28px;padding:14px 20px;background:#1f2233;border-radius:0 0 24px 24px;">
          <img src="https://memoai.eu/memo-logo-compressed.png" alt="Memo" width="132" height="48" style="display:block;width:132px;height:48px;object-fit:contain;" />
        </div>
        <h1 style="margin:22px 0 18px;font-size:34px;line-height:1.05;color:#17171b;">
          Use this code
        </h1>
        <div style="width:100%;max-width:380px;margin:0 auto 32px;padding:28px 16px;border-radius:24px;background:#ffffff;text-align:center;box-shadow:0 8px 24px rgba(18,18,24,0.06);">
          <span style="display:block;font-size:46px;line-height:1;font-weight:800;letter-spacing:0.34em;color:#17171b;text-indent:0.34em;">
            {{ .Token }}
          </span>
        </div>
        <p style="margin:0 0 18px;font-size:15px;line-height:1.5;color:#17171b;font-weight:700;">
          Enter this in Memo.
        </p>
        <p style="margin:0;font-size:13px;line-height:1.55;color:#666c7d;">
          If you didn&apos;t request this, you can ignore this email.
        </p>
      </div>
    </div>
  </body>
</html>
